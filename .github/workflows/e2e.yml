name: E2E Tests

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # On pull_request, just pass through without running tests
      - name: Skip on PR (tests run in merge queue)
        if: github.event_name == 'pull_request'
        run: echo "Skipping e2e tests on PR - will run in merge queue"

      # Only run actual tests on merge_group or manual trigger
      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request'

      - uses: pnpm/action-setup@v4
        if: github.event_name != 'pull_request'

      - uses: actions/setup-node@v4
        if: github.event_name != 'pull_request'
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        if: github.event_name != 'pull_request'
        run: pnpm install

      - name: Install Playwright browsers
        if: github.event_name != 'pull_request'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        if: github.event_name != 'pull_request'
        run: pnpm test:e2e
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_OTP: ${{ secrets.TEST_USER_OTP }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
          NEXT_PUBLIC_PRIVY_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_CLIENT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - uses: actions/upload-artifact@v4
        if: failure() && github.event_name != 'pull_request'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
