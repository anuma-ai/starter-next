name: E2E Tests
permissions:
  contents: read
on:
  merge_group:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-light:
    if: github.event_name != 'workflow_dispatch' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_OTP: ${{ secrets.TEST_USER_OTP }}
      NEXT_PUBLIC_DROPBOX_APP_KEY: ${{ secrets.NEXT_PUBLIC_DROPBOX_APP_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run light tests
        run: pnpm test:e2e:light

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-light
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-full:
    if: github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_OTP: ${{ secrets.TEST_USER_OTP }}
      NEXT_PUBLIC_DROPBOX_APP_KEY: ${{ secrets.NEXT_PUBLIC_DROPBOX_APP_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run full tests
        continue-on-error: true
        run: pnpm test:e2e:full

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-status:
    if: always()
    needs: [e2e-light, e2e-full]
    runs-on: ubuntu-latest
    steps:
      - name: Check e2e results
        run: |
          if [[ "${{ needs.e2e-light.result }}" == "failure" ]]; then
            echo "Light tests failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-full.result }}" == "failure" ]]; then
            echo "Full tests failed"
            exit 1
          fi
          echo "All e2e tests passed (or skipped)"

  push-videos:
    needs: [e2e-light, e2e-full]
    if: |
      !cancelled() &&
      needs.e2e-light.result != 'failure' &&
      needs.e2e-full.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download light test results
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-light
          path: artifacts/light
        continue-on-error: true

      - name: Download full test results
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-full
          path: artifacts/full
        continue-on-error: true

      - name: Collect videos
        id: collect
        run: |
          mkdir -p videos
          # Only collect from test-results (skip playwright-report/data blobs)
          find artifacts -path '*/test-results/*' -name '*.webm' | while read -r f; do
            dir=$(basename "$(dirname "$f")")
            base=$(basename "$f")
            cp "$f" "videos/${dir}--${base}"
          done
          count=$(find videos -name '*.webm' | wc -l)
          echo "video_count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count video(s)"

      - name: Generate index
        if: steps.collect.outputs.video_count > 0
        run: |
          echo "# Features" > videos/README.md
          echo "" >> videos/README.md
          for f in videos/*.webm; do
            filename=$(basename "$f")
            # Extract clean test name from Playwright directory name
            # Format: <file>-<Describe>-<test-name>-<tag>-<project>--video.webm
            name="${filename%--video.webm}"
            # Strip trailing project name
            name=$(echo "$name" | sed -E 's/-(chromium|setup)$//')
            # Strip trailing test tag
            name=$(echo "$name" | sed -E 's/-(light|full)$//')
            # Strip leading test file name
            name=$(echo "$name" | sed -E 's/^(auth\.setup\.ts|chat|chart|demo)-//')
            # Convert hyphens to spaces for title
            title=$(echo "$name" | tr '-' ' ')
            echo "" >> videos/README.md
            echo "### $title" >> videos/README.md
            echo "" >> videos/README.md
            echo "<video src=\"https://github.com/${{ github.repository }}/raw/refs/heads/demo/${filename}\" controls style=\"border-radius: 8px;\"></video>" >> videos/README.md
          done
          echo "" >> videos/README.md
          echo "Updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> videos/README.md

      - name: Push videos to demo branch
        if: steps.collect.outputs.video_count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create orphan branch with only videos
          git checkout --orphan demo-tmp
          git rm -rf .
          cp videos/*.webm .
          cp videos/README.md .
          git add *.webm README.md
          git commit -m "e2e videos from $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Ref: ${{ github.sha }}"
          git push --force origin demo-tmp:demo
